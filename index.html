<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SKRE Guild War Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="topbar">
  <h1>⚔️ SKRE Guild War Planner</h1>
  <span class="grow"></span>
  <div id="auth-status" class="auth-status"></div>
  <button id="btn-new" class="editor-only" title="New matchup">+ New</button>
  <button id="btn-clear" class="editor-only" title="Clear teams &amp; note">Clear</button>
</header>

<main>
  <section class="workarea">
    <div class="meta-row">
      <div class="f">
        <label for="m-name">Matchup name</label>
        <input id="m-name" type="text" placeholder="e.g. vs GuildX — Round 1">
      </div>
      <div>
        <label for="m-result">Result</label>
        <select id="m-result">
          <option value="untested">Untested</option>
          <option value="win">Win</option>
          <option value="loss">Loss</option>
        </select>
      </div>
    </div>

    <div class="formations-row">
      <section class="formation-section">
        <label class="section-label">เลือกแผน — ทีมเรา</label>
        <div id="formation-picker-our" class="formation-picker"></div>
      </section>
      <section class="formation-section">
        <label class="section-label">เลือกแผน — ศัตรู</label>
        <div id="formation-picker-enemy" class="formation-picker"></div>
      </section>
    </div>

    <div class="teams">
      <div class="vs-badge">VS</div>
      <div class="team our">
        <div class="team-head">
          <h2>Our Team</h2>
          <div class="team-head-right">
            <span class="team-spd">Total SPD: <strong id="our-total-spd">0</strong></span>
          </div>
        </div>
        <div class="team-pets-bar" id="team-pets-our"></div>
        <div class="slots our" id="team-our" data-formation="plan1"></div>
        <span class="team-diamond-bottom" aria-hidden="true"></span>
      </div>
      <div class="team enemy">
        <div class="team-head">
          <h2>Enemy Team</h2>
          <div class="team-head-right">
            <label class="team-spd">
              Total SPD:
              <input id="enemy-total-spd" type="number" step="1" value="0">
            </label>
          </div>
        </div>
        <div class="team-pets-bar" id="team-pets-enemy"></div>
        <div class="slots enemy" id="team-enemy" data-formation="plan1"></div>
        <span class="team-diamond-bottom" aria-hidden="true"></span>
      </div>
    </div>

    <details class="loadout-section" open>
      <summary class="loadout-summary">Our team — Pets, Sets & Stats</summary>
      <div id="our-loadout" class="loadout-list"></div>
    </details>

    <section class="skill-order-section">
      <label class="section-label">Skill order (max 3)</label>
      <div id="skill-order" class="skill-order-row"></div>
    </section>

    <div class="note-section">
      <label for="m-note">Notes / tactics</label>
      <textarea id="m-note" rows="4" placeholder="Turn order, counters, key skills..."></textarea>
    </div>
  </section>

  <aside class="sidebar">
    <h2>Saved matchups</h2>
    <div id="saved-list"></div>
  </aside>
</main>

<!-- Character picker modal -->
<div class="picker" id="picker">
  <div class="picker-backdrop" id="picker-backdrop"></div>
  <div class="picker-panel">
    <div class="picker-head">
      <h2>Pick a character</h2>
      <span class="grow"></span>
      <input id="picker-q" type="text" placeholder="Search name...">
      <span id="picker-count" class="muted"></span>
      <button id="picker-close" class="picker-close">Close</button>
    </div>
    <div class="filter-row">
      <div id="filter-grades"></div>
      <div id="filter-types"></div>
    </div>
    <div class="picker-grid" id="picker-grid"></div>
  </div>
</div>

<!-- Set picker modal -->
<div class="picker" id="set-modal">
  <div class="picker-backdrop" id="set-modal-backdrop"></div>
  <div class="picker-panel">
    <div class="picker-head">
      <h2 id="set-modal-title">Pick set(s)</h2>
      <span class="grow"></span>
      <span class="muted">Click to toggle — multiple allowed</span>
      <button id="set-modal-close" class="picker-close">Done</button>
    </div>
    <div class="set-grid" id="set-grid"></div>
  </div>
</div>

<!-- Formation picker modal -->
<div class="picker" id="formation-modal">
  <div class="picker-backdrop" id="formation-modal-backdrop"></div>
  <div class="picker-panel formation-modal-panel">
    <div class="picker-head">
      <h2 id="formation-modal-title">Pick formation</h2>
      <span class="grow"></span>
      <button id="formation-modal-close" class="picker-close" onclick="closeFormationModal()">Close</button>
    </div>
    <div id="formation-grid" class="formation-grid"></div>
  </div>
</div>

<!-- Pet picker modal -->
<div class="picker" id="pet-modal">
  <div class="picker-backdrop" id="pet-modal-backdrop"></div>
  <div class="picker-panel">
    <div class="picker-head">
      <h2 id="pet-modal-title">Pick pet</h2>
      <span class="grow"></span>
      <button id="pet-modal-close" class="picker-close">Close</button>
    </div>
    <div class="pet-grid" id="pet-grid"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="state.js"></script>
<script src="store.js"></script>
<script src="auth.js"></script>
<script src="render.js"></script>
<script src="app.js"></script>
</body>
</html>
